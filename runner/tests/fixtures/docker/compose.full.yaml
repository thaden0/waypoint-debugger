services:
  app:
    build: .
    command: php artisan octane:start --host=0.0.0.0
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    environment:
      APP_ENV: local

  web:
    image: nginx:alpine
    ports:
      - "80:80"

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: shop
      MYSQL_USER: dev
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root

  redis:
    image: redis:7-alpine
    # intentionally no published ports -> network-join required

  queue:
    build: .
    command: php artisan queue:work
